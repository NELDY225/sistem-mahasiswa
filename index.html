<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Manajemen Mahasiswa | Database Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body.dark {
            --bg-primary: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-input: #252525;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease;
            min-height: 100vh;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        body.dark .login-card {
            background: var(--bg-card);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Dashboard Container */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        /* Student List */
        .student-item {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .student-item:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .student-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--primary);
            cursor: pointer;
        }

        .student-name:hover {
            text-decoration: underline;
        }

        .grade-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .grade-A { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .grade-B { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .grade-C { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .grade-D, .grade-E { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        /* Search */
        .search-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .search-row input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 14px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 28px;
            max-width: 550px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        /* Alert */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .detail-row {
            display: flex;
            margin-bottom: 14px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-label {
            width: 100px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .detail-value {
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row, .form-row-3 {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .student-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==========================================
        // 🔧 KONFIGURASI SUPABASE - GANTI DENGAN DATA ANDA!
        // ==========================================
        // Dari Step 3: Dapatkan dari Project Settings > API
        const SUPABASE_URL = 'https://dfzxtyfywbscjplwvdmw.supabase.co/rest/v1/';  // GANTI INI!
        const SUPABASE_ANON_KEY = 'sb_publishable_t6oMzMX5ydjfkPhLePIzJw_C4DpH_uW';  // GANTI INI!
        
        // Inisialisasi Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ==========================================
        // VARIABEL GLOBAL
        // ==========================================
        let currentUser = null;
        let students = [];
        let editTarget = null;

        // ==========================================
        // FUNGSI BANTUAN
        // ==========================================
        function showToast(msg, type, elementId) {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerHTML = msg;
                el.className = `alert alert-${type}`;
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 3000);
            }
        }

        function getGrade(na) {
            if (na >= 85) return 'A';
            if (na >= 75) return 'B';
            if (na >= 65) return 'C';
            if (na >= 50) return 'D';
            return 'E';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.innerHTML = isDark ? '☀️ Mode Terang' : '🌙 Mode Gelap';
            }
        }

        // ==========================================
        // FUNGSI LOGIN & REGISTER
        // ==========================================
        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            
            if (!username || !password) {
                showToast('Username dan password harus diisi', 'error', 'loginAlert');
                return;
            }
            
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);
            
            if (error || !data || data.length === 0) {
                showToast('Username atau password salah', 'error', 'loginAlert');
                return;
            }
            
            currentUser = data[0];
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            showDashboard();
        }

        async function doRegister() {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (username.length < 3) {
                showToast('Username minimal 3 karakter', 'error', 'regAlert');
                return;
            }
            if (password.length < 6) {
                showToast('Password minimal 6 karakter', 'error', 'regAlert');
                return;
            }
            if (password !== confirm) {
                showToast('Konfirmasi password tidak cocok', 'error', 'regAlert');
                return;
            }
            
            // Cek username sudah ada
            const { data: existing } = await supabase
                .from('users')
                .select('username')
                .eq('username', username);
            
            if (existing && existing.length > 0) {
                showToast('Username sudah terdaftar', 'error', 'regAlert');
                return;
            }
            
            const { error } = await supabase
                .from('users')
                .insert([{ username, password }]);
            
            if (error) {
                showToast('Pendaftaran gagal: ' + error.message, 'error', 'regAlert');
            } else {
                showToast('Pendaftaran berhasil! Silakan login.', 'success', 'regAlert');
                setTimeout(() => showLogin(), 1500);
            }
        }

        // ==========================================
        // FUNGSI CRUD MAHASISWA
        // ==========================================
        async function loadMahasiswa() {
            const { data, error } = await supabase
                .from('mahasiswa')
                .select('*')
                .order('nama', { ascending: true });
            
            if (!error && data) {
                students = data;
                renderList();
                updateStats();
            } else {
                console.error('Error loading mahasiswa:', error);
            }
        }

        async function updateStats() {
            const { data, error } = await supabase.from('mahasiswa').select('*');
            if (!error && data && data.length > 0) {
                const total = data.length;
                const avgNilai = data.reduce((s, m) => s + (m.nilai_akhir || 0), 0) / total;
                const maxNilai = Math.max(...data.map(m => m.nilai_akhir || 0));
                const minNilai = Math.min(...data.map(m => m.nilai_akhir || 0));
                const gradeA = data.filter(m => getGrade(m.nilai_akhir) === 'A').length;
                
                document.getElementById('totalMhs') && (document.getElementById('totalMhs').innerText = total);
                document.getElementById('avgNilai') && (document.getElementById('avgNilai').innerText = avgNilai.toFixed(1));
                document.getElementById('nilaiTertinggi') && (document.getElementById('nilaiTertinggi').innerText = maxNilai.toFixed(1));
                document.getElementById('nilaiTerendah') && (document.getElementById('nilaiTerendah').innerText = minNilai.toFixed(1));
                document.getElementById('gradeACount') && (document.getElementById('gradeACount').innerText = gradeA);
            }
        }

        async function tambahMahasiswa(data) {
            const nilai_akhir = (data.nilai_tugas * 0.3) + (data.nilai_uts * 0.3) + (data.nilai_uas * 0.4);
            const newData = { ...data, nilai_akhir };
            
            const { error } = await supabase.from('mahasiswa').insert([newData]);
            if (error) {
                showToast(error.message, 'error', 'globalAlert');
            } else {
                await loadMahasiswa();
                showToast('Mahasiswa berhasil ditambahkan!', 'success', 'globalAlert');
                closeModal();
            }
        }

        async function editMahasiswa(oldNim, data) {
            const nilai_akhir = (data.nilai_tugas * 0.3) + (data.nilai_uts * 0.3) + (data.nilai_uas * 0.4);
            const newData = { ...data, nilai_akhir };
            
            const { error } = await supabase
                .from('mahasiswa')
                .update(newData)
                .eq('nim', oldNim);
            
            if (error) {
                showToast(error.message, 'error', 'globalAlert');
            } else {
                await loadMahasiswa();
                showToast('Data berhasil diupdate!', 'success', 'globalAlert');
                closeModal();
            }
        }

        async function hapusMahasiswa(nim) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                const { error } = await supabase.from('mahasiswa').delete().eq('nim', nim);
                if (error) {
                    showToast(error.message, 'error', 'globalAlert');
                } else {
                    await loadMahasiswa();
                    showToast('Data berhasil dihapus!', 'success', 'globalAlert');
                }
            }
        }

        async function cariMahasiswa() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                showToast('Masukkan kata kunci pencarian', 'warning', 'globalAlert');
                return;
            }
            
            const { data, error } = await supabase
                .from('mahasiswa')
                .select('*')
                .or(`nama.ilike.%${keyword}%,nim.ilike.%${keyword}%`);
            
            const area = document.getElementById('searchResultArea');
            if (error || !data || data.length === 0) {
                area.innerHTML = `<div class="card" style="margin-top:12px; background:var(--bg-input)">❌ Tidak ditemukan: ${escapeHtml(keyword)}</div>`;
            } else {
                let html = `<div class="card" style="margin-top:12px"><strong>✅ Ditemukan ${data.length} data:</strong>`;
                data.forEach(s => {
                    const grade = getGrade(s.nilai_akhir);
                    html += `<div style="padding:12px; border-bottom:1px solid var(--border)">
                                <b style="color:var(--primary)">${escapeHtml(s.nama)}</b> (${s.nim})<br>
                                <span style="font-size:12px">${escapeHtml(s.jurusan)} | Grade ${grade} | Nilai Akhir: ${(s.nilai_akhir || 0).toFixed(1)}</span>
                            </div>`;
                });
                html += `</div>`;
                area.innerHTML = html;
            }
            area.style.display = 'block';
        }

        // ==========================================
        // FUNGSI RENDER UI
        // ==========================================
        function renderList() {
            const container = document.getElementById('studentList');
            if (!container) return;
            
            if (students.length === 0) {
                container.innerHTML = '<div class="empty">📭 Belum ada data mahasiswa. Klik "Tambah Mahasiswa" untuk menambahkan.</div>';
                return;
            }
            
            container.innerHTML = '';
            students.forEach(s => {
                const grade = getGrade(s.nilai_akhir);
                const gradeClass = `grade-${grade}`;
                const div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `
                    <div class="student-row">
                        <div>
                            <div class="student-name" onclick="showDetail('${s.nim}')">${escapeHtml(s.nama)}</div>
                            <div style="font-size:11px; color:var(--text-secondary)">NIM: ${s.nim}</div>
                        </div>
                        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap">
                            <span class="grade-badge ${gradeClass}">Grade ${grade}</span>
                            <span>Nilai Akhir: ${(s.nilai_akhir || 0).toFixed(1)}</span>
                        </div>
                        <div style="display:flex; gap:8px">
                            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); editStudent('${s.nim}')">✏️ Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); hapusMahasiswa('${s.nim}')">🗑️ Hapus</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function showDetail(nim) {
            const s = students.find(x => x.nim === nim);
            if (!s) return;
            const grade = getGrade(s.nilai_akhir);
            const gradeClass = `grade-${grade}`;
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-row"><div class="detail-label">NIM</div><div class="detail-value">${s.nim}</div></div>
                <div class="detail-row"><div class="detail-label">Nama</div><div class="detail-value">${escapeHtml(s.nama)}</div></div>
                <div class="detail-row"><div class="detail-label">Email</div><div class="detail-value">${escapeHtml(s.email)}</div></div>
                <div class="detail-row"><div class="detail-label">No. HP</div><div class="detail-value">${s.hp || '-'}</div></div>
                <div class="detail-row"><div class="detail-label">Jurusan</div><div class="detail-value">${escapeHtml(s.jurusan)}</div></div>
                <div class="detail-row"><div class="detail-label">Alamat</div><div class="detail-value">${escapeHtml(s.alamat) || '-'}</div></div>
                <div class="detail-row"><div class="detail-label">Grade / Nilai</div><div class="detail-value"><span class="grade-badge ${gradeClass}">Grade ${grade}</span> | Nilai Akhir: ${(s.nilai_akhir || 0).toFixed(2)}</div></div>
                <div style="background:var(--bg-input); border-radius:14px; padding:14px; margin-top:12px">
                    <div style="font-weight:700; margin-bottom:10px">📊 Nilai Akademik</div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px">
                        <div>📝 Tugas: ${s.nilai_tugas || 0}</div>
                        <div>📖 UTS: ${s.nilai_uts || 0}</div>
                        <div>📚 UAS: ${s.nilai_uas || 0}</div>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        // ==========================================
        // FUNGSI MODAL
        // ==========================================
        function openModal() {
            editTarget = null;
            document.getElementById('modalTitle').innerText = 'Tambah Mahasiswa';
            document.getElementById('mNim').value = '';
            document.getElementById('mNama').value = '';
            document.getElementById('mEmail').value = '';
            document.getElementById('mHp').value = '';
            document.getElementById('mJurusan').value = 'Teknik Informatika';
            document.getElementById('mAlamat').value = '';
            document.getElementById('mTugas').value = 80;
            document.getElementById('mUTS').value = 80;
            document.getElementById('mUAS').value = 80;
            document.getElementById('modalAlert').style.display = 'none';
            document.getElementById('crudModal').style.display = 'flex';
        }

        function editStudent(nim) {
            const s = students.find(x => x.nim === nim);
            if (!s) return;
            editTarget = nim;
            document.getElementById('modalTitle').innerText = 'Edit Mahasiswa';
            document.getElementById('mNim').value = s.nim;
            document.getElementById('mNama').value = s.nama;
            document.getElementById('mEmail').value = s.email;
            document.getElementById('mHp').value = s.hp || '';
            document.getElementById('mJurusan').value = s.jurusan;
            document.getElementById('mAlamat').value = s.alamat || '';
            document.getElementById('mTugas').value = s.nilai_tugas || 80;
            document.getElementById('mUTS').value = s.nilai_uts || 80;
            document.getElementById('mUAS').value = s.nilai_uas || 80;
            document.getElementById('modalAlert').style.display = 'none';
            document.getElementById('crudModal').style.display = 'flex';
        }

        function saveStudent() {
            const data = {
                nim: document.getElementById('mNim').value.trim(),
                nama: document.getElementById('mNama').value.trim(),
                email: document.getElementById('mEmail').value.trim(),
                hp: document.getElementById('mHp').value.trim(),
                jurusan: document.getElementById('mJurusan').value.trim() || 'Umum',
                alamat: document.getElementById('mAlamat').value.trim(),
                nilai_tugas: parseFloat(document.getElementById('mTugas').value) || 0,
                nilai_uts: parseFloat(document.getElementById('mUTS').value) || 0,
                nilai_uas: parseFloat(document.getElementById('mUAS').value) || 0
            };
            
            if (!/^\d{12}$/.test(data.nim)) {
                showToast('NIM harus 12 digit angka', 'error', 'modalAlert');
                return;
            }
            if (data.nama.length < 3) {
                showToast('Nama minimal 3 huruf', 'error', 'modalAlert');
                return;
            }
            if (data.nilai_tugas < 0 || data.nilai_tugas > 100 ||
                data.nilai_uts < 0 || data.nilai_uts > 100 ||
                data.nilai_uas < 0 || data.nilai_uas > 100) {
                showToast('Nilai harus antara 0-100', 'error', 'modalAlert');
                return;
            }
            
            if (editTarget) {
                editMahasiswa(editTarget, data);
            } else {
                tambahMahasiswa(data);
            }
        }

        function closeModal() { document.getElementById('crudModal').style.display = 'none'; }
        function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; }

        // ==========================================
        // FUNGSI NAVIGASI
        // ==========================================
        function showLogin() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') document.body.classList.add('dark');
            
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <h2>🎓 Sistem Manajemen Mahasiswa</h2>
                        <p class="login-subtitle">Login untuk mengakses dashboard</p>
                        <div id="loginAlert" class="alert"></div>
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="loginUser" placeholder="Masukkan username" value="admin">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPass" placeholder="Masukkan password" value="admin123">
                        </div>
                        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Masuk</button>
                        <p style="text-align:center; margin-top:20px">
                            Belum punya akun? <a href="#" onclick="showRegister()" style="color:var(--primary)">Daftar Sekarang</a>
                        </p>
                        <div style="margin-top:20px; padding:12px; background:rgba(99,102,241,0.1); border-radius:12px; text-align:center">
                            <small>📋 Demo: admin / admin123</small>
                        </div>
                    </div>
                </div>
            `;
        }

        function showRegister() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <h2>📝 Daftar Akun Baru</h2>
                        <p class="login-subtitle">Isi data untuk mendaftar</p>
                        <div id="regAlert" class="alert"></div>
                        <div class="form-group">
                            <label>Username (min 3 karakter)</label>
                            <input type="text" id="regUser" placeholder="Buat username">
                        </div>
                        <div class="form-group">
                            <label>Password (min 6 karakter)</label>
                            <input type="password" id="regPass" placeholder="Buat password">
                        </div>
                        <div class="form-group">
                            <label>Konfirmasi Password</label>
                            <input type="password" id="regConfirm" placeholder="Ulangi password">
                        </div>
                        <button class="btn btn-primary" style="width:100%" onclick="doRegister()">Daftar</button>
                        <p style="text-align:center; margin-top:20px">
                            Sudah punya akun? <a href="#" onclick="showLogin()" style="color:var(--primary)">Login disini</a>
                        </p>
                    </div>
                </div>
            `;
        }

        function showDashboard() {
            const isDark = document.body.classList.contains('dark');
            document.getElementById('app').innerHTML = `
                <div class="dashboard-container">
                    <div class="header">
                        <h1>📋 Sistem Manajemen Mahasiswa</h1>
                        <div class="user-info">
                            <button class="btn btn-outline btn-sm" id="themeBtn" onclick="toggleTheme()">${isDark ? '☀️ Mode Terang' : '🌙 Mode Gelap'}</button>
                            <div class="user-avatar">${(currentUser?.username?.charAt(0) || 'A').toUpperCase()}</div>
                            <span>${currentUser?.username || 'Admin'}</span>
                            <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
                        </div>
                    </div>
                    
                    <div id="globalAlert" class="alert"></div>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-number" id="totalMhs">0</div><div class="stat-label">Total Mahasiswa</div></div>
                        <div class="stat-card"><div class="stat-number" id="avgNilai">0</div><div class="stat-label">Rata-rata Nilai Akhir</div></div>
                        <div class="stat-card"><div class="stat-number" id="gradeACount">0</div><div class="stat-label">Grade A</div></div>
                        <div class="stat-card"><div class="stat-number" id="nilaiTertinggi">0</div><div class="stat-label">Nilai Tertinggi</div></div>
                        <div class="stat-card"><div class="stat-number" id="nilaiTerendah">0</div><div class="stat-label">Nilai Terendah</div></div>
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="openModal()">+ Tambah Mahasiswa</button>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">🔍 Cari Mahasiswa</div>
                        <div class="search-row">
                            <input type="text" id="searchInput" placeholder="Cari berdasarkan Nama atau NIM...">
                            <button class="btn btn-primary" onclick="cariMahasiswa()">Cari</button>
                        </div>
                        <div id="searchResultArea" style="display:none"></div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">📜 Daftar Mahasiswa <span style="font-size:12px; font-weight:normal">(klik nama untuk detail)</span></div>
                        <div id="studentList"></div>
                    </div>
                </div>
                
                <!-- Modal Tambah/Edit -->
                <div id="crudModal" class="modal">
                    <div class="modal-content">
                        <h2 id="modalTitle">Tambah Mahasiswa</h2>
                        <div id="modalAlert" class="alert"></div>
                        <div class="form-group"><label>NIM (12 digit)</label><input type="text" id="mNim" maxlength="12" placeholder="202311001234"></div>
                        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="mNama" placeholder="Nama mahasiswa"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="mEmail" placeholder="email@univ.ac.id"></div>
                        <div class="form-row">
                            <div class="form-group"><label>No. HP</label><input type="tel" id="mHp" placeholder="08xxxxxxxxxx"></div>
                            <div class="form-group"><label>Jurusan</label><input type="text" id="mJurusan" value="Teknik Informatika"></div>
                        </div>
                        <div class="form-group"><label>Alamat</label><input type="text" id="mAlamat" placeholder="Jl. ..."></div>
                        <div class="form-row-3">
                            <div class="form-group"><label>Nilai Tugas (0-100)</label><input type="number" id="mTugas" value="80" step="1"></div>
                            <div class="form-group"><label>Nilai UTS (0-100)</label><input type="number" id="mUTS" value="80" step="1"></div>
                            <div class="form-group"><label>Nilai UAS (0-100)</label><input type="number" id="mUAS" value="80" step="1"></div>
                        </div>
                        <div class="btn-group" style="margin-top:16px">
                            <button class="btn btn-outline" onclick="closeModal()">Batal</button>
                            <button class="btn btn-primary" onclick="saveStudent()">Simpan</button>
                        </div>
                    </div>
                </div>
                
                <!-- Modal Detail -->
                <div id="detailModal" class="modal">
                    <div class="modal-content">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
                            <h3>📌 Detail Mahasiswa</h3>
                            <button onclick="closeDetailModal()" style="background:none; border:none; font-size:24px; cursor:pointer">&times;</button>
                        </div>
                        <div id="detailContent"></div>
                    </div>
                </div>
            `;
            
            loadMahasiswa();
            
            // Event listener untuk enter key pada search
            document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') cariMahasiswa();
            });
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            showLogin();
        }

        // ==========================================
        // INITIALISASI
        // ==========================================
        function init() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') document.body.classList.add('dark');
            
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    showDashboard();
                } catch(e) {
                    showLogin();
                }
            } else {
                showLogin();
            }
        }

        // Expose functions ke global scope
        window.doLogin = doLogin;
        window.doRegister = doRegister;
        window.showLogin = showLogin;
        window.showRegister = showRegister;
        window.logout = logout;
        window.openModal = openModal;
        window.editStudent = editStudent;
        window.saveStudent = saveStudent;
        window.closeModal = closeModal;
        window.closeDetailModal = closeDetailModal;
        window.showDetail = showDetail;
        window.hapusMahasiswa = hapusMahasiswa;
        window.cariMahasiswa = cariMahasiswa;
        window.toggleTheme = toggleTheme;

        // Jalankan init
        init();
    </script>
</body>
</html>
