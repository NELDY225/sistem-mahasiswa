<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Manajemen Mahasiswa | Full CRUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: rgba(245, 247, 250, 0.92);
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-solid: #ffffff;
            --bg-input: rgba(241, 245, 249, 0.9);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: rgba(226, 232, 240, 0.6);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --sidebar-width: 280px;
            --sidebar-collapsed: 70px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --blur-bg: blur(12px);
        }

        body.dark {
            --bg-primary: rgba(10, 10, 10, 0.92);
            --bg-card: rgba(26, 26, 26, 0.95);
            --bg-card-solid: #1a1a1a;
            --bg-input: rgba(37, 37, 37, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border: rgba(42, 42, 42, 0.6);
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
            position: relative;
        }

        /* Background Animasi */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: floatOrb 25s ease-in-out infinite;
        }

        .gradient-orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4), rgba(139, 92, 246, 0.1));
            top: -150px;
            left: -150px;
        }

        .gradient-orb-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.1));
            bottom: -200px;
            right: -150px;
            animation-delay: 5s;
        }

        .gradient-orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3), rgba(99, 102, 241, 0.1));
            top: 40%;
            left: 30%;
            animation-delay: 10s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0%, 0%) scale(1); }
            33% { transform: translate(5%, -5%) scale(1.05); }
            66% { transform: translate(-3%, 3%) scale(0.98); }
            100% { transform: translate(0%, 0%) scale(1); }
        }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.06;
            animation: floatParticle 20s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -20px) rotate(120deg); }
            66% { transform: translate(-20px, 15px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        body.dark .loading-screen {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading-logo span { font-size: 48px; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255,255,255,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        .loading-text { font-size: 24px; font-weight: 700; color: white; margin-bottom: 16px; letter-spacing: 2px; }
        .loading-dots { display: flex; gap: 8px; margin-bottom: 24px; }
        .loading-dots span { width: 10px; height: 10px; background: white; border-radius: 50%; animation: bounce 1.4s ease-in-out infinite; }
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .loading-bar-container { width: 200px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
        .loading-bar { width: 0%; height: 100%; background: white; border-radius: 3px; animation: loadingProgress 1.5s ease-in-out infinite; }
        @keyframes loadingProgress { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }

        /* Layout */
        .app-layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-card);
            backdrop-filter: var(--blur-bg);
            border-right: 1px solid var(--border);
            transition: var(--transition);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-header h3 { display: none; }

        .toggle-sidebar {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .toggle-sidebar:hover { background: var(--primary); color: white; }

        .nav-menu { flex: 1; padding: 20px 12px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .nav-item:hover { background: rgba(99, 102, 241, 0.1); color: var(--text-primary); }
        .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .nav-icon { font-size: 20px; min-width: 24px; text-align: center; }
        .nav-label { font-size: 14px; font-weight: 500; white-space: nowrap; }
        .sidebar.collapsed .nav-label { display: none; }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
        .user-info-sidebar { display: flex; align-items: center; gap: 12px; }
        .user-avatar-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
        }
        .sidebar.collapsed .user-details { display: none; }
        .user-details { flex: 1; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-role { font-size: 11px; color: var(--text-muted); }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: var(--transition);
            padding: 24px;
            min-height: 100vh;
        }
        .main-content.expanded { margin-left: var(--sidebar-collapsed); }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .top-actions { display: flex; gap: 12px; align-items: center; }

        .theme-toggle-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: var(--transition);
        }
        .theme-toggle-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }

        .user-badge {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .mobile-menu-btn {
            display: none;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-primary);
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            backdrop-filter: var(--blur-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .card-header { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

        /* Stats */
        .stats-main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: var(--blur-bg);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .stat-number { font-size: 28px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .btn-danger { background: var(--danger); color: white; border: none; }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

        /* Search */
        .search-row { display: flex; gap: 12px; margin-top: 16px; }
        .search-row input { flex: 1; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 40px; color: var(--text-primary); }

        /* Student List */
        .student-item {
            background: var(--bg-card);
            backdrop-filter: var(--blur-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .student-item:hover { border-color: var(--primary); transform: translateX(4px); }
        .student-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .student-name { font-weight: 700; color: var(--primary); cursor: pointer; }
        .student-name:hover { text-decoration: underline; }

        .grade-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .grade-A { background: rgba(16,185,129,0.2); color: #10b981; }
        .grade-B { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .grade-C { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .grade-D, .grade-E { background: rgba(239,68,68,0.2); color: #ef4444; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-content {
            background: var(--bg-card-solid);
            border-radius: 24px;
            padding: 24px;
            max-width: 650px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 13px; }
        .form-group input:focus { outline: none; border-color: var(--primary); }

        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { width: 100%; padding: 12px 45px 12px 16px; }
        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            border-radius: 40px;
            color: var(--text-secondary);
        }
        .toggle-password:hover { color: var(--primary); background: rgba(99,102,241,0.1); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .form-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        .error-text { color: var(--danger); font-size: 11px; margin-top: 4px; display: block; }
        .alert { padding: 12px; border-radius: 12px; margin-bottom: 16px; display: none; font-size: 13px; }
        .alert-success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .alert-error { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
        .detail-row { display: flex; margin-bottom: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .detail-label { width: 100px; font-weight: 600; color: var(--text-secondary); }
        .detail-value { flex: 1; }
        .bobot-info { background: rgba(99,102,241,0.1); border-radius: 12px; padding: 12px; margin-top: 12px; font-size: 11px; }

        .page-content { display: none; }
        .page-content.active-page { display: block; }

        /* Login Page */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .login-card {
            background: var(--bg-card);
            backdrop-filter: var(--blur-bg);
            border-radius: 32px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }
        .login-card h2 { text-align: center; margin-bottom: 8px; }
        .demo-info { margin-top: 20px; padding: 12px; background: rgba(99,102,241,0.1); border-radius: 12px; text-align: center; font-size: 12px; }
        .demo-badge { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
        .demo-badge span { background: var(--bg-input); padding: 4px 12px; border-radius: 20px; font-family: monospace; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .sidebar.mobile-open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: block; }
            .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr; gap: 10px; }
            .student-row { flex-direction: column; align-items: flex-start; }
            .stats-main { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg-canvas">
        <div class="gradient-orb gradient-orb-1"></div>
        <div class="gradient-orb gradient-orb-2"></div>
        <div class="gradient-orb gradient-orb-3"></div>
        <div class="floating-particles" id="particlesContainer"></div>
    </div>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo"><span>🎓</span></div>
        <div class="loading-text">Memuat Sistem</div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-bar-container"><div class="loading-bar"></div></div>
    </div>

    <div id="app-root" style="display: none;"></div>

    <script>
        // Generate Particles
        function generateParticles() {
            const container = document.getElementById('particlesContainer');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 80 + 20;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 20 + 15 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }

        function hideLoading() {
            const loadingScreen = document.getElementById('loadingScreen');
            const appRoot = document.getElementById('app-root');
            if (loadingScreen) {
                loadingScreen.classList.add('fade-out');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    if (appRoot) appRoot.style.display = 'block';
                }, 500);
            } else {
                if (appRoot) appRoot.style.display = 'block';
            }
        }

        // ==========================================
        // KONFIGURASI SHEETDB.IO
        // ==========================================
        const SHEETDB_API = 'https://sheetdb.io/api/v1/xffnxq7d9n82j';
        const SHEETDB_USERS_API = SHEETDB_API + '?sheet=users';
        const SHEETDB_MAHASISWA_API = SHEETDB_API + '?sheet=mahasiswa';

        let currentUser = null;
        let students = [];
        let users = [];
        let editTargetNim = null;
        let isEdit = false;

        const BOBOT = {
            absensi: 0.05, tugasHarian: 0.10, praktikum: 0.15,
            uts: 0.20, uas: 0.25, proyek: 0.15, softskill: 0.10
        };

        function hitungNilaiAkhir(data) {
            let nilai = 0;
            nilai += (data.absensi || 0) * BOBOT.absensi;
            nilai += (data.tugasHarian || 0) * BOBOT.tugasHarian;
            nilai += (data.praktikum || 0) * BOBOT.praktikum;
            nilai += (data.uts || 0) * BOBOT.uts;
            nilai += (data.uas || 0) * BOBOT.uas;
            nilai += (data.proyek || 0) * BOBOT.proyek;
            nilai += (data.softskill || 0) * BOBOT.softskill;
            return Math.min(100, Math.max(0, nilai));
        }

        function getGrade(na) {
            if (na >= 85) return 'A';
            if (na >= 75) return 'B';
            if (na >= 65) return 'C';
            if (na >= 50) return 'D';
            return 'E';
        }

        function hitungIPK(na) {
            if (na >= 85) return 4.0;
            if (na >= 80) return 3.7;
            if (na >= 75) return 3.3;
            if (na >= 70) return 3.0;
            if (na >= 65) return 2.7;
            if (na >= 60) return 2.3;
            if (na >= 55) return 2.0;
            if (na >= 50) return 1.7;
            if (na >= 40) return 1.0;
            return 0.0;
        }

        function showToast(msg, type, alertId) {
            const el = document.getElementById(alertId);
            if (el) {
                el.innerHTML = msg;
                el.className = `alert alert-${type}`;
                el.style.display = "block";
                setTimeout(() => el.style.display = "none", 3000);
            }
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        // Password Toggle
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btn.innerHTML = "🙈";
            } else {
                input.type = "password";
                btn.innerHTML = "👁️";
            }
        }

        // Theme
        function initTheme() {

        // CRUD Users
        async function loadUsers() {
            try {
                const response = await fetch(SHEETDB_USERS_API);
                if (!response.ok) throw new Error();
                const data = await response.json();
                users = Array.isArray(data) ? data : [];

                users = [{ username: "admin", password: "admin123" }];

        async function addUserToSheet(username, password) {
            try {
                const newUser = { username, password, created_at: new Date().toISOString() };
                const response = await fetch(SHEETDB_USERS_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                });
                return response.ok;

        // ==========================================
        // CRUD MAHASISWA - EDIT & DELETE BERFUNGSI
        // ==========================================
        
        async function loadMahasiswa() {
            try {
                const response = await fetch(SHEETDB_MAHASISWA_API);
                if (!response.ok) throw new Error();
                const data = await response.json();
                students = Array.isArray(data) ? data : [];
                renderList();
                updateStats();
            } catch (error) {
                showToast('Gagal memuat data', 'error', 'globalAlert');
                students = [];
                renderList();
                updateStats();
            }
        }

        async function updateStats() {
            const total = students.length;
            const avgIpk = total ? (students.reduce((s, m) => s + (parseFloat(m.ipk) || 0), 0) / total).toFixed(2) : 0;
            const avgNa = total ? (students.reduce((s, m) => s + (parseFloat(m.nilai_akhir) || 0), 0) / total).toFixed(1) : 0;
            const gradeACount = students.filter(s => s.grade === 'A').length;
            
            document.getElementById('totalMhs') && (document.getElementById('totalMhs').innerText = total);
            document.getElementById('avgIpk') && (document.getElementById('avgIpk').innerText = avgIpk);
            document.getElementById('avgNilai') && (document.getElementById('avgNilai').innerText = avgNa);
            document.getElementById('gradeCount') && (document.getElementById('gradeCount').innerText = gradeACount);
        }

        async function addStudent(data) {
            if (!/^\d{12}$/.test(data.nim)) throw new Error('NIM harus 12 digit angka');
            if (data.nama.trim().length < 3) throw new Error('Nama minimal 3 huruf');
            if (students.find(s => s.nim === data.nim)) throw new Error('NIM sudah terdaftar');
            
            const nilai_akhir = hitungNilaiAkhir(data);
            const ipk = hitungIPK(nilai_akhir);
            const grade = getGrade(nilai_akhir);
            const newData = { ...data, nilai_akhir, ipk, grade };
            
            const response = await fetch(SHEETDB_MAHASISWA_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: newData })
            });
            if (!response.ok) throw new Error('Gagal menambahkan');
            await loadMahasiswa();
            showToast('Mahasiswa berhasil ditambahkan!', 'success', 'globalAlert');
        }

        // ========== FUNGSI EDIT MAHASISWA ==========
        async function updateStudent(oldNim, newData) {
            const nilai_akhir = hitungNilaiAkhir(newData);
            const ipk = hitungIPK(nilai_akhir);
            const grade = getGrade(nilai_akhir);
            const updatedData = { ...newData, nilai_akhir, ipk, grade };
            
            // Cari ID dari data yang akan diupdate
            const studentToUpdate = students.find(s => s.nim === oldNim);
            if (!studentToUpdate) throw new Error('Data tidak ditemukan');
            
            const response = await fetch(`${SHEETDB_MAHASISWA_API}/${studentToUpdate.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: updatedData })
            });
            
            if (!response.ok) throw new Error('Gagal mengupdate data');
            await loadMahasiswa();
            showToast('Data berhasil diupdate!', 'success', 'globalAlert');
        }

        // ========== FUNGSI HAPUS MAHASISWA ==========
        async function deleteStudent(nim) {
            if (!confirm('Yakin ingin menghapus data mahasiswa ini?')) return;
            
            const studentToDelete = students.find(s => s.nim === nim);
            if (!studentToDelete) throw new Error('Data tidak ditemukan');
            
            const response = await fetch(`${SHEETDB_MAHASISWA_API}/${studentToDelete.id}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) throw new Error('Gagal menghapus data');
            await loadMahasiswa();
            showToast('Data berhasil dihapus!', 'success', 'globalAlert');
        }

            container.innerHTML = '';

                const div = document.createElement('div');
                div.className = 'student-item';

        // Search
        function searchStudent() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                showToast('Masukkan kata kunci', 'warning', 'globalAlert');
                return;
            }
            const results = students.filter(s => 
                s.nama.toLowerCase().includes(keyword.toLowerCase()) || s.nim.includes(keyword)
            );
            const area = document.getElementById('searchResultArea');
            if (results.length === 0) {
                area.innerHTML = `<div class="card" style="margin-top:12px">❌ Tidak ditemukan: ${escapeHtml(keyword)}</div>`;
            } else {
                let html = `<div class="card" style="margin-top:12px"><strong>✅ Ditemukan ${results.length} data:</strong>`;
                results.forEach(s => {
                    html += `<div style="padding:10px; border-bottom:1px solid var(--border)">
                                <b style="color:var(--primary)">${escapeHtml(s.nama)}</b> (${s.nim})<br>
                                ${escapeHtml(s.jurusan)} | Nilai: ${s.nilai_akhir || 0}
                            </div>`;
                });
                html += `</div>`;
                area.innerHTML = html;
            }
            area.style.display = 'block';
        }

            students.sort((a, b) => parseFloat(b.ipk || 0) - parseFloat(a.ipk || 0));
            renderList();

        async function saveStudent() {
            try {
                const data = {
                    nim: document.getElementById('mNim').value.trim(),
                    nama: document.getElementById('mNama').value.trim(),
                    email: document.getElementById('mEmail').value.trim(),
                    hp: document.getElementById('mHp').value.trim(),
                    jurusan: document.getElementById('mJurusan').value.trim() || 'Umum',
                    alamat: document.getElementById('mAlamat').value.trim(),
                    absensi: parseFloat(document.getElementById('mAbsensi').value) || 0,
                    tugas_harian: parseFloat(document.getElementById('mTugasHarian').value) || 0,
                    praktikum: parseFloat(document.getElementById('mPraktikum').value) || 0,
                    uts: parseFloat(document.getElementById('mUTS').value) || 0,
                    uas: parseFloat(document.getElementById('mUAS').value) || 0,
                    proyek: parseFloat(document.getElementById('mProyek').value) || 0,
                    softskill: parseFloat(document.getElementById('mSoftskill').value) || 0
                };
                if (!/^\d{12}$/.test(data.nim)) throw new Error('NIM harus 12 digit angka');
                if (isEdit) await updateStudent(editTargetNim, data);
                else await addStudent(data);
                closeModal();
            } catch (e) {
                showToast(e.message, 'error', 'modalAlert');
            }
        }

        // Auth
        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            await loadUsers();
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) {
                showToast('Username atau password salah!', 'error', 'loginAlert');
                return;
            }
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            renderDashboard();
        }

        async function doRegister() {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('regConfirm').value;
            if (username.length < 3) {
                showToast('Username minimal 3 karakter', 'error', 'regAlert');
                return;
            }
            if (password.length < 6) {
                showToast('Password minimal 6 karakter', 'error', 'regAlert');
                return;
            }
            if (password !== confirm) {
                showToast('Konfirmasi password tidak cocok', 'error', 'regAlert');
                return;
            }
            await loadUsers();
            if (users.find(u => u.username === username)) {
                showToast('Username sudah terdaftar!', 'error', 'regAlert');
                return;
            }
            const success = await addUserToSheet(username, password);
            if (success) {
                showToast('Pendaftaran berhasil! Silakan login.', 'success', 'regAlert');
                setTimeout(() => showLoginPage(), 1500);
            } else {
                showToast('Pendaftaran gagal', 'error', 'regAlert');
            }
        }

                                <div class="card-header">📜 Daftar Mahasiswa <span style="font-size:12px">(klik nama untuk detail)</span></div>
                                <div id="studentList"></div>
                            </div>
                        </div>
                        
                        <div id="page-statistik" class="page-content">
                            <div class="stats-main">
                                <div class="stat-card"><div class="stat-number" id="statTotalMhs">0</div><div class="stat-label">Total Mahasiswa</div></div>
                                <div class="stat-card"><div class="stat-number" id="statRataIpk">0</div><div class="stat-label">Rata-rata IPK</div></div>
                                <div class="stat-card"><div class="stat-number" id="statRataNilai">0</div><div class="stat-label">Rata Nilai Akhir</div></div>
                                <div class="stat-card"><div class="stat-number" id="statGradeA">0</div><div class="stat-label">Grade A</div></div>
                            </div>
                            <div class="card">
                                <div class="card-header">Distribusi Grade</div>
                                <div id="gradeDistribution"></div>
                                <div class="bobot-info" style="margin-top:20px">
                                    <strong>Bobot Penilaian:</strong> Absensi 5% | Tugas 10% | Praktikum 15% | UTS 20% | UAS 25% | Proyek 15% | Softskill 10%
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="crudModal" class="modal">
                    <div class="modal-content">
                        <h2 id="modalTitle">Tambah Mahasiswa</h2>
                        <div id="modalAlert" class="alert"></div>
                        <div class="form-group"><label>NIM (12 digit)</label><input type="text" id="mNim" maxlength="12"><span class="error-text" id="errNim"></span></div>
                        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="mNama"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="mEmail"></div>
                        <div class="form-row">
                            <div class="form-group"><label>No. HP</label><input type="tel" id="mHp"></div>
                            <div class="form-group"><label>Jurusan</label><input type="text" id="mJurusan" value="Teknik Informatika"></div>
                        </div>
                        <div class="form-group"><label>Alamat</label><input type="text" id="mAlamat"></div>
                        <div style="background:var(--bg-input);border-radius:16px;padding:16px;margin:16px 0">
                            <h4>📊 Nilai Akademik</h4>
                            <div class="form-row-4">
                                <div class="form-group"><label>Absensi</label><input type="number" id="mAbsensi" value="90"></div>
                                <div class="form-group"><label>Tugas Harian</label><input type="number" id="mTugasHarian" value="80"></div>
                                <div class="form-group"><label>Praktikum</label><input type="number" id="mPraktikum" value="80"></div>
                                <div class="form-group"><label>UTS</label><input type="number" id="mUTS" value="80"></div>
                            </div>
                            <div class="form-row-3">
                                <div class="form-group"><label>UAS</label><input type="number" id="mUAS" value="80"></div>
                                <div class="form-group"><label>Proyek</label><input type="number" id="mProyek" value="80"></div>
                                <div class="form-group"><label>Softskill</label><input type="number" id="mSoftskill" value="80"></div>
                            </div>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-outline" onclick="closeModal()">Batal</button>
                            <button class="btn btn-primary" onclick="saveStudent()">Simpan</button>
                        </div>
                    </div>
                </div>
                
                <div id="detailModal" class="modal">
                    <div class="modal-content">
                        <div style="display:flex;justify-content:space-between;margin-bottom:16px">
                            <h3>Detail Mahasiswa</h3>
                            <button onclick="closeDetailModal()">&times;</button>
                        </div>
                        <div id="detailContent"></div>
                    </div>
                </div>
            `;
            
            loadMahasiswa();
            updateThemeButton();
            
            document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchStudent();
            });
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => switchPage(item.getAttribute('data-page')));
            });
            
            hideLoading();
        }

        async function init() {
            generateParticles();
            initTheme();
            await loadUsers();
            
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    const userExists = users.find(u => u.username === currentUser.username);
                    if (userExists) renderDashboard();
                    else showLoginPage();
                } catch(e) { showLoginPage(); }
            } else {
                showLoginPage();
            }
        }

        window.togglePassword = togglePassword;
        window.toggleTheme = toggleTheme;
        window.toggleSidebar = toggleSidebar;
        window.mobileToggleSidebar = mobileToggleSidebar;
        window.doLogin = doLogin;
        window.doRegister = doRegister;
        window.showLoginPage = showLoginPage;
        window.showRegisterPage = showRegisterPage;
        window.logout = logout;
        window.switchPage = switchPage;
        window.openModal = openModal;
        window.editStudent = editStudent;
        window.saveStudent = saveStudent;
        window.closeModal = closeModal;
        window.closeDetailModal = closeDetailModal;
        window.showDetail = showDetail;
        window.deleteStudent = deleteStudent;
        window.searchStudent = searchStudent;
        window.sortByName = sortByName;
        window.sortByIpk = sortByIpk;
        window.sortByNilai = sortByNilai;

        init();
    </script>
</body>
</html>
