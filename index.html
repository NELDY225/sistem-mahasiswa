<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Manajemen Mahasiswa | Nilai Lengkap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Tema Default (Light) */
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --bg-input: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --sidebar-width: 280px;
            --sidebar-collapsed: 70px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Tema Gelap (Dark) */
        body.dark {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-card-hover: #222222;
            --bg-input: #252525;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border: #2a2a2a;
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Layout */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-header h3 {
            display: none;
        }

        .toggle-sidebar {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .toggle-sidebar:hover {
            background: var(--primary);
            color: white;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .nav-item:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .nav-icon {
            font-size: 20px;
            min-width: 24px;
            text-align: center;
        }

        .nav-label {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .sidebar.collapsed .nav-label {
            display: none;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .user-info-sidebar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .sidebar.collapsed .user-details {
            display: none;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .user-role {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: all 0.3s ease;
            padding: 24px;
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: var(--sidebar-collapsed);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .top-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-toggle-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .theme-toggle-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .user-badge {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .mobile-menu-btn {
            display: none;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-primary);
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .card-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Stats */
        .stats-main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .stats-nilai {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border-radius: 20px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .nilai-item {
            text-align: center;
        }

        .nilai-angka {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        .nilai-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        /* Search */
        .method-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .method-btn {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .method-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: transparent;
        }

        .search-row {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }

        .search-row input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .search-row input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .result-box {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            border-left: 3px solid var(--primary);
        }

        /* Student Item */
        .student-item {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .student-item:hover {
            border-color: var(--primary);
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }

        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .student-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .student-name:hover {
            text-decoration: underline;
            color: #a855f7;
        }

        .grade-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
        }

        .grade-A { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .grade-B { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        .grade-C { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .grade-D { background: rgba(249, 115, 22, 0.2); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.3); }
        .grade-E { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .ipk-text {
            font-weight: 700;
            color: var(--success);
        }

        /* Form Section */
        .form-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }

        .form-section-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        /* Password Wrapper */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .form-row-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .error-text {
            color: var(--danger);
            font-size: 10px;
            margin-top: 6px;
            display: block;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }

        .alert-success { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .alert-error { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .alert-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .alert-info { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .detail-row {
            display: flex;
            margin-bottom: 14px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-label {
            width: 120px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .detail-value {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
        }

        .close-detail {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .close-detail:hover {
            color: var(--danger);
        }

        .action-icons {
            display: flex;
            gap: 8px;
        }

        .page-content {
            display: none;
        }

        .page-content.active-page {
            display: block;
        }

        .settings-group {
            margin-bottom: 24px;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        /* Login */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
        }

        .login-card h2 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .demo-info {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
        }

        .demo-info .demo-badge {
            display: inline-flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .demo-info .demo-badge span {
            background: var(--bg-input);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            color: var(--primary);
        }

        /* Bobot Info */
        .bobot-info {
            background: rgba(99, 102, 241, 0.08);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .bobot-info span {
            color: var(--primary);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr; gap: 10px; }
            .student-row { flex-direction: column; align-items: flex-start; }
            .mobile-menu-btn { display: block; }
            .stats-main { grid-template-columns: repeat(2, 1fr); }
            .theme-toggle-btn span:not(.theme-icon) { display: none; }
            .theme-toggle-btn { padding: 8px 12px; }
            .detail-label { width: 100px; }
        }

        @media (min-width: 769px) {
            .mobile-menu-btn { display: none; }
        }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <script>
        // ======================= DATA STORAGE =======================
        let users = [];
        let students = [];
        let currentUser = null;
        let currentMethod = "sequential";
        let editTargetNim = null;
        let isEdit = false;

        // Bobot penilaian (dalam persen)
        const BOBOT = {
            absensi: 0.05,      // 5%
            tugasHarian: 0.10,  // 10%
            praktikum: 0.15,    // 15%
            uts: 0.20,          // 20%
            uas: 0.25,          // 25%
            proyek: 0.15,       // 15%
            softskill: 0.10     // 10%
        };

        // Theme handling
        function initTheme() {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
            } else if (savedTheme === 'light') {
                document.body.classList.remove('dark');
            } else {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.body.classList.add('dark');
                    localStorage.setItem('app_theme', 'dark');
                } else {
                    document.body.classList.remove('dark');
                    localStorage.setItem('app_theme', 'light');
                }
            }
            updateThemeButton();
        }

        function toggleTheme() {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                localStorage.setItem('app_theme', 'light');
            } else {
                document.body.classList.add('dark');
                localStorage.setItem('app_theme', 'dark');
            }
            updateThemeButton();
        }

        function updateThemeButton() {
            const themeBtn = document.getElementById('themeToggleBtn');
            if (themeBtn) {
                const isDark = document.body.classList.contains('dark');
                themeBtn.innerHTML = isDark ? '<span class="theme-icon">☀️</span><span>Mode Terang</span>' : '<span class="theme-icon">🌙</span><span>Mode Gelap</span>';
            }
        }

        // Hitung Nilai Akhir berdasarkan semua komponen
        function hitungNilaiAkhir(data) {
            let nilai = 0;
            nilai += (data.absensi || 0) * BOBOT.absensi;
            nilai += (data.tugasHarian || 0) * BOBOT.tugasHarian;
            nilai += (data.praktikum || 0) * BOBOT.praktikum;
            nilai += (data.uts || 0) * BOBOT.uts;

            nilai += (data.proyek || 0) * BOBOT.proyek;
            nilai += (data.softskill || 0) * BOBOT.softskill;
            return Math.min(100, Math.max(0, nilai));
        }

        function sortByName() {
            for (let i = 0; i < students.length - 1; i++)
                for (let j = 0; j < students.length - i - 1; j++)
                    if (students[j].nama.toLowerCase() > students[j + 1].nama.toLowerCase())
                        [students[j], students[j + 1]] = [students[j + 1], students[j]];
            saveToStorage(); renderList(); showToast("Diurutkan berdasarkan Nama", "success", "globalAlert");
        }

        function sortByIpk() {
            for (let i = 0; i < students.length; i++) {
                let maxIdx = i;
                for (let j = i + 1; j < students.length; j++)
                    if (students[j].ipk > students[maxIdx].ipk) maxIdx = j;
                [students[i], students[maxIdx]] = [students[maxIdx], students[i]];
            }
            saveToStorage(); renderList(); showToast("Diurutkan berdasarkan IPK Tertinggi", "success", "globalAlert");
        }

        function sortByNilai() {
            students.sort((a, b) => b.nilaiAkhir - a.nilaiAkhir);

        }

        // Search Methods
        function sequentialSearch(key) {
            const kw = key.toLowerCase();
            const results = [];
            let comp = 0;
            for (let s of students) {
                comp++;
                if (s.nama.toLowerCase().includes(kw) || s.nim.includes(kw)) results.push(s);
            }
            return { results, comparisons: comp, complexity: "O(n)" };
        }

        function linearSearch(key) {
            const kw = key.toLowerCase();
            const results = [];
            let comp = 0;
            for (let s of students) {
                comp++;
                if (s.nama.toLowerCase() === kw || s.nim === kw) results.push(s);
            }
            return { results, comparisons: comp, complexity: "O(n)" };
        }

        function binarySearch(key) {
            const kw = key.toLowerCase();
            let comp = 0;
            const sorted = [...students].sort((a, b) => a.nama.toLowerCase().localeCompare(b.nama.toLowerCase()));
            let left = 0, right = sorted.length - 1;
            let found = null;
            while (left <= right) {
                comp++;
                const mid = Math.floor((left + right) / 2);
                const midName = sorted[mid].nama.toLowerCase();
                if (midName === kw) { found = sorted[mid]; break; }
                else if (midName < kw) left = mid + 1;
                else right = mid - 1;
            }
            const results = found ? students.filter(s => s.nama.toLowerCase() === kw) : [];
            return { results, comparisons: comp, complexity: "O(log n)" };
        }

        function executeSearch() {
            const keyword = document.getElementById("searchInput").value.trim();
            if (!keyword) return showToast("Masukkan kata kunci", "warning", "globalAlert");
            let result;
            const start = performance.now();
            if (currentMethod === "sequential") result = sequentialSearch(keyword);
            else if (currentMethod === "linear") result = linearSearch(keyword);
            else result = binarySearch(keyword);
            const time = (performance.now() - start).toFixed(2);

            const area = document.getElementById("searchResultArea");
            const names = { sequential: "Sequential", linear: "Linear", binary: "Binary" };
            let html = `<div class="result-box">
                <div><strong>${names[currentMethod]} Search</strong> | <span style="color: var(--primary);">${result.complexity}</span></div>
                <div style="font-size:12px;">Waktu: ${time} ms | Perbandingan: ${result.comparisons} kali</div>`;
            if (result.results.length === 0) html += `<div style="color: var(--danger); margin-top:12px;">Tidak ditemukan: ${escapeHtml(keyword)}</div>`;
            else {
                html += `<div style="margin-top:12px;"><strong>Ditemukan ${result.results.length} data:</strong>`;
                result.results.forEach(s => {
                    html += `<div style="background: var(--bg-card); border-radius:12px; padding:10px; margin-top:8px;">
                                <b style="color: var(--primary);">${escapeHtml(s.nama)}</b> (${s.nim})<br>
                                <span style="font-size:11px;">${escapeHtml(s.jurusan)} | IPK: ${s.ipk.toFixed(2)} | Grade: ${s.grade}</span>
                             </div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            area.style.display = "block";
            area.innerHTML = html;
        }

            if (userIndex === -1) return showToast("User tidak ditemukan", "error", "passwordAlert");
            if (users[userIndex].password !== oldPass) return showToast("Password lama salah", "error", "passwordAlert");
            if (newPass.length < 6) return showToast("Password baru minimal 6 karakter", "error", "passwordAlert");
            if (newPass !== confirmPass) return showToast("Konfirmasi password tidak cocok", "error", "passwordAlert");
            users[userIndex].password = newPass;
            saveToStorage();
            showToast("Password berhasil diubah", "success", "passwordAlert");
            setTimeout(() => closePasswordModal(), 1500);
        }

        // Export
        function exportData() {
            const data = { export_date: new Date().toISOString(), total_data: students.length, mahasiswa: students };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_mahasiswa_${new Date().toISOString().slice(0, 19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("Data berhasil diekspor", "success", "globalAlert");
        }

        function exportUsersData() {
            const data = { export_date: new Date().toISOString(), users: users.map(u => ({ username: u.username, created_at: u.created_at })) };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_akun_${new Date().toISOString().slice(0, 19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("Data akun berhasil diekspor", "success", "globalAlert");
        }

        // Navigation
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const mainContent = document.getElementById("mainContent");
            sidebar.classList.toggle("collapsed");
            mainContent.classList.toggle("expanded");
            const btn = document.querySelector(".toggle-sidebar");
            if (btn) btn.innerHTML = sidebar.classList.contains("collapsed") ? "▶" : "◀";
        }

        function mobileToggleSidebar() { document.getElementById("sidebar").classList.toggle("mobile-open"); }

        function switchPage(pageId) {
            document.querySelectorAll(".page-content").forEach(p => p.classList.remove("active-page"));
            const targetPage = document.getElementById(`page-${pageId}`);
            if (targetPage) targetPage.classList.add("active-page");
            document.querySelectorAll(".nav-item").forEach(item => item.classList.remove("active"));
            const activeNav = document.querySelector(`.nav-item[data-page="${pageId}"]`);
            if (activeNav) activeNav.classList.add("active");
            const titles = { dashboard: "Dashboard", datamahasiswa: "Data Mahasiswa", statistik: "Statistik Nilai", pengaturan: "Pengaturan Akun", export: "Ekspor Data", tentang: "Tentang Aplikasi" };
            const titleEl = document.getElementById("pageTitle");
            if (titleEl) titleEl.innerText = titles[pageId] || "Dashboard";
            if (pageId === "pengaturan") {
                const usernameEl = document.getElementById("currentUsername");
                if (usernameEl) usernameEl.innerText = currentUser;
            }
            if (window.innerWidth <= 768) document.getElementById("sidebar").classList.remove("mobile-open");
        }

        // Auth
        function doLogin() {
            const user = document.getElementById("loginUser").value.trim();
            const pass = document.getElementById("loginPass").value;
            const found = users.find(u => u.username === user && u.password === pass);
            if (!found) return showToast("Username atau password salah", "error", "loginAlert");
            currentUser = user;
            localStorage.setItem("current_session_final_v6", user);
            renderDashboard();
        }

        function doRegister() {
            const user = document.getElementById("regUser").value.trim();
            const pass = document.getElementById("regPass").value;
            const confirm = document.getElementById("regConfirm").value;
            if (!/^[a-zA-Z0-9]{3,}$/.test(user)) {
                document.getElementById("regUserErr").innerText = "Minimal 3 karakter (huruf/angka)";
                return;
            }
            if (users.find(u => u.username === user)) {
                document.getElementById("regUserErr").innerText = "Username sudah terdaftar";
                return;
            }
            if (pass.length < 6) {
                document.getElementById("regPassErr").innerText = "Minimal 6 karakter";
                return;
            }
            if (pass !== confirm) return showToast("Password konfirmasi tidak cocok", "error", "regAlert");
            users.push({ username: user, password: pass, created_at: new Date().toISOString() });
            saveToStorage();
            showToast("Pendaftaran berhasil! Silakan login.", "success", "regAlert");
            setTimeout(() => showLoginPage(), 1500);
        }
