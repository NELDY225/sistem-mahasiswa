<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Manajemen Mahasiswa | Full Realtime Firebase</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-card: rgba(255, 255, 255, 0.92);
            --bg-card-solid: #ffffff;
            --bg-input: rgba(241, 245, 249, 0.9);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: rgba(226, 232, 240, 0.6);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --sidebar-width: 280px;
            --sidebar-collapsed: 80px;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.dark {
            --bg-card: rgba(15, 23, 42, 0.92);
            --bg-card-solid: #0f172a;
            --bg-input: rgba(30, 41, 59, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(51, 65, 85, 0.6);
            --primary: #818cf8;
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; color: var(--text-primary); min-height: 100vh; transition: var(--transition); background: #f8fafc; }
        body.dark { background: #020617; }
        
        /* Animated Background */
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        .gradient-orb { position: absolute; width: 60vw; height: 60vw; border-radius: 50%; filter: blur(100px); opacity: 0.4; animation: floatOrb 20s ease-in-out infinite; }
        .orb-1 { background: radial-gradient(circle, #6366f1, #a855f7); top: -20%; left: -10%; }
        .orb-2 { background: radial-gradient(circle, #06b6d4, #3b82f6); bottom: -20%; right: -10%; width: 50vw; height: 50vw; animation-delay: -7s; }
        .orb-3 { background: radial-gradient(circle, #ec4899, #f97316); top: 30%; right: 20%; width: 40vw; height: 40vw; animation-delay: -14s; opacity: 0.3; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 33% { transform: translate(5%, 3%) scale(1.05); } 66% { transform: translate(-3%, 5%) scale(0.98); } 100% { transform: translate(0, 0) scale(1); } }
        
        .particle-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .particle { position: absolute; background: rgba(99, 102, 241, 0.4); border-radius: 50%; animation: particleFloat linear infinite; }
        @keyframes particleFloat { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.4; } 100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; } }
        
        /* Loading Screen */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease; }
        .loading-overlay.fade-out { opacity: 0; visibility: hidden; }
        .loading-container { text-align: center; }
        .loading-logo { width: 100px; height: 100px; background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); border-radius: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; animation: floatLogo 2s infinite; }
        .loading-logo span { font-size: 50px; animation: pulseLogo 1.5s infinite; }
        @keyframes floatLogo { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes pulseLogo { 0%,100% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.08); opacity: 1; } }
        .loading-text { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #fff, #c4b5fd); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 4px; margin-bottom: 20px; }
        .loading-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .loading-dots span { width: 12px; height: 12px; background: white; border-radius: 50%; animation: dotBounce 1.4s infinite; }
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-18px); opacity: 1; } }
        .loading-progress { width: 280px; margin: 0 auto; }
        .progress-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #fff, #a855f7); animation: progressFill 2s infinite; }
        @keyframes progressFill { 0% { width: 0%; } 100% { width: 100%; } }
        .progress-percent { color: rgba(255,255,255,0.9); font-size: 12px; text-align: center; margin-top: 12px; letter-spacing: 2px; }
        
        /* Layout */
        .app-layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }
        .sidebar { position: fixed; left: 0; top: 0; width: var(--sidebar-width); height: 100vh; background: var(--bg-card); backdrop-filter: blur(16px); border-right: 1px solid var(--border); transition: var(--transition); z-index: 100; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #a855f7); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .sidebar-header h3 { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, var(--primary), #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sidebar.collapsed .logo-area span:not(.logo-icon) { display: none; }
        .toggle-sidebar { background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 6px 10px; cursor: pointer; }
        
        .nav-section { padding: 0 12px; margin-top: 16px; }
        .section-header { padding: 8px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
        .nav-menu { flex: 1; padding-bottom: 20px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; margin: 2px 12px; border-radius: 12px; cursor: pointer; transition: var(--transition); color: var(--text-secondary); font-weight: 500; font-size: 14px; }
        .nav-item:hover { background: rgba(99, 102, 241, 0.12); color: var(--text-primary); transform: translateX(4px); }
        .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .nav-icon { font-size: 18px; min-width: 28px; text-align: center; }
        .nav-label { font-size: 13px; font-weight: 500; }
        .sidebar.collapsed .nav-label { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 12px; margin: 4px 8px; }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); margin-top: auto; }
        .user-info-sidebar { display: flex; align-items: center; gap: 12px; }
        .user-avatar-small { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 40px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; flex-shrink: 0; }
        .sidebar.collapsed .user-details { display: none; }
        .user-name { font-size: 13px; font-weight: 700; }
        .user-role { font-size: 10px; opacity: 0.7; }
        
        .main-content { flex: 1; margin-left: var(--sidebar-width); transition: var(--transition); padding: 24px; min-height: 100vh; }
        .main-content.expanded { margin-left: var(--sidebar-collapsed); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
        .page-title { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--text-primary), var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .top-actions { display: flex; gap: 12px; align-items: center; }
        .theme-toggle-btn { background: var(--bg-input); border: 1px solid var(--border); border-radius: 40px; padding: 8px 18px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .theme-toggle-btn:hover { background: var(--primary); color: white; }
        .user-badge { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 44px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: white; }
        .mobile-menu-btn { display: none; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; cursor: pointer; font-size: 18px; }
        
        .card { background: var(--bg-card); backdrop-filter: blur(12px); border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); transition: var(--transition); }
        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .stats-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border); transition: var(--transition); }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .stat-number { font-size: 32px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-top: 8px; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 14px; font-weight: 600; font-size: 13px; cursor: pointer; transition: var(--transition); background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(99,102,241,0.35); }
        .btn-danger { background: var(--danger); color: white; border: none; }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 14px; color: var(--text-primary); font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .form-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { padding-right: 48px; }
        .toggle-password { position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 18px; padding: 8px; color: var(--text-secondary); }
        
        .alert { padding: 12px 16px; border-radius: 16px; margin-bottom: 20px; display: none; font-size: 13px; font-weight: 500; }
        .alert-success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .alert-error { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { font-weight: 700; color: var(--primary); background: rgba(99,102,241,0.08); }
        .badge-status { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .status-lunas { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-belum { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .student-item { background: var(--bg-card); backdrop-filter: blur(12px); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .student-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .student-name { font-weight: 700; color: var(--primary); cursor: pointer; }
        .grade-badge { padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .grade-A { background: rgba(16,185,129,0.2); color: #10b981; }
        .grade-B { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .grade-C { background: rgba(245,158,11,0.2); color: #f59e0b; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; padding: 16px; }
        .modal-content { background: var(--bg-card-solid); border-radius: 28px; padding: 28px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
        .detail-row { display: flex; margin-bottom: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .detail-label { width: 120px; font-weight: 700; color: var(--text-secondary); }
        .page-content { display: none; }
        .page-content.active-page { display: block; }
        
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--bg-card); backdrop-filter: blur(16px); border-radius: 40px; padding: 40px; max-width: 420px; width: 100%; border: 1px solid var(--border); }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .sidebar.mobile-open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: block; }
            .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr; gap: 12px; }
            .stats-main { grid-template-columns: repeat(2, 1fr); }
            .data-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"><div class="gradient-orb orb-1"></div><div class="gradient-orb orb-2"></div><div class="gradient-orb orb-3"></div><div class="particle-field" id="particleField"></div></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-container">
            <div class="loading-logo"><span>🎓</span></div>
            <div class="loading-text">SISTEM MAHASISWA</div>
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <div class="loading-progress"><div class="progress-bar-container"><div class="progress-bar-fill"></div></div><div class="progress-percent" id="progressPercent">LOADING 0%</div></div>
        </div>
    </div>
    <div id="app-root" style="display: none;"></div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyD174J0prcbxgCA3_tSafzsyPJNHKTrXj8",
            authDomain: "sistem-mahasiswa-c40f4.firebaseapp.com",
            databaseURL: "https://sistem-mahasiswa-c40f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sistem-mahasiswa-c40f4",
            storageBucket: "sistem-mahasiswa-c40f4.firebasestorage.app",
            messagingSenderId: "71539435477",
            appId: "1:71539435477:web:3f81b1c273ccdee5667f5c"
        };
        
        // Inisialisasi Firebase
        let app;
        try {
            app = firebase.initializeApp(firebaseConfig);
            console.log("Firebase berhasil diinisialisasi");
        } catch(e) {
            console.log("Firebase sudah diinisialisasi");
        }
        
        const database = firebase.database();
        
        // Database References
        const usersRef = database.ref('users');
        const mahasiswaRef = database.ref('mahasiswa');
        const jadwalRef = database.ref('jadwal');
        const keuanganRef = database.ref('keuangan');
        const pembayaranRef = database.ref('pembayaran');
        const pengumumanRef = database.ref('pengumuman');
        const kegiatanRef = database.ref('kegiatan');

        // Global Variables
        let currentUser = null;
        let students = [];
        let jadwalList = [];
        let keuanganList = [];
        let pembayaranList = [];
        let pengumumanList = [];
        let kegiatanList = [];
        let statsChart = null;
        
        const BOBOT = { absensi: 0.05, tugasHarian: 0.10, praktikum: 0.15, uts: 0.20, uas: 0.25, proyek: 0.15, softskill: 0.10 };
        
        function hitungNilaiAkhir(data) {
            return Math.min(100, Math.max(0,
                (data.absensi||0)*0.05 + (data.tugas_harian||0)*0.10 + (data.praktikum||0)*0.15 +
                (data.uts||0)*0.20 + (data.uas||0)*0.25 + (data.proyek||0)*0.15 + (data.softskill||0)*0.10
            ));
        }
        function getGrade(na) { if (na >= 85) return 'A'; if (na >= 75) return 'B'; if (na >= 65) return 'C'; return 'D'; }
        function hitungIPK(na) { if (na >= 85) return 4.0; if (na >= 80) return 3.7; if (na >= 75) return 3.3; return 3.0; }
        function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]); }
        function showToast(msg, type, alertId) { 
            const el = document.getElementById(alertId); 
            if(el){ el.innerHTML = msg; el.className = `alert alert-${type}`; el.style.display = "block"; setTimeout(() => el.style.display = "none", 3000); } 
        }
        
        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === "password") { input.type = "text"; btn.innerHTML = "🙈"; }
            else { input.type = "password"; btn.innerHTML = "👁️"; }
        };
        
        // ==================== REALTIME LISTENERS ====================
        function setupRealtimeListeners() {
            // Mahasiswa
            mahasiswaRef.on('value', (snapshot) => {
                const data = snapshot.val();
                students = data ? Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id })) : [];
                renderList();
                updateStats();
                updateChart();
            });
            
            // Jadwal
            jadwalRef.on('value', (snapshot) => {
                const data = snapshot.val();
                jadwalList = data ? Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id })) : [];
                renderJadwal();
                updateDashboardCounts();
            });
            
            // Keuangan
            keuanganRef.on('value', (snapshot) => {
                const data = snapshot.val();
                keuanganList = data ? Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id })) : [];
                renderKeuangan('keuanganList');
                renderKeuangan('keuanganList2');
                updateDashboardCounts();
            });
            
            // Pembayaran
            pembayaranRef.on('value', (snapshot) => {
                const data = snapshot.val();
                pembayaranList = data ? Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id })) : [];
                renderPembayaran();
            });
            
            // Pengumuman
            pengumumanRef.on('value', (snapshot) => {
                const data = snapshot.val();
                pengumumanList = data ? Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id })) : [];
                renderPengumuman();
                updateDashboardCounts();
            });
            
            // Kegiatan
            kegiatanRef.on('value', (snapshot) => {
                const data = snapshot.val();
                kegiatanList = data ? Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id })) : [];
                renderKegiatan();
                updateDashboardCounts();
            });
        }
        
        function updateDashboardCounts() {
            document.getElementById('totalJadwal') && (document.getElementById('totalJadwal').innerText = jadwalList.length);
            document.getElementById('totalPengumuman') && (document.getElementById('totalPengumuman').innerText = pengumumanList.length);
            document.getElementById('totalKegiatan') && (document.getElementById('totalKegiatan').innerText = kegiatanList.length);
            const totalTagihan = keuanganList.reduce((s,k)=>s+(k.jumlah||0),0);
            document.getElementById('totalTagihan') && (document.getElementById('totalTagihan').innerText = 'Rp ' + totalTagihan.toLocaleString());
        }
        
        // ==================== CRUD FUNCTIONS ====================
        
        // MAHASISWA
        async function addStudent(data) {
            if (!/^\d{12}$/.test(data.nim)) throw new Error('NIM harus 12 digit angka');
            if (data.nama.trim().length < 3) throw new Error('Nama minimal 3 huruf');
            if (students.find(s => s.nim === data.nim)) throw new Error('NIM sudah terdaftar');
            const nilai_akhir = hitungNilaiAkhir(data);
            const ipk = hitungIPK(nilai_akhir);
            const grade = getGrade(nilai_akhir);
            await mahasiswaRef.push().set({ ...data, nilai_akhir, ipk, grade, createdAt: Date.now() });
            showToast('Mahasiswa berhasil ditambahkan!', 'success', 'globalAlert');
            return true;
        }
        
        async function updateStudent(oldNim, newData) {
            const student = students.find(s => s.nim === oldNim);
            if (!student) throw new Error('Data tidak ditemukan');
            const nilai_akhir = hitungNilaiAkhir(newData);
            const ipk = hitungIPK(nilai_akhir);
            const grade = getGrade(nilai_akhir);
            await mahasiswaRef.child(student.firebaseId).update({ ...newData, nilai_akhir, ipk, grade });
            showToast('Data berhasil diupdate!', 'success', 'globalAlert');

            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('regConfirm').value;
            if(username.length<3) { showToast('Username min 3 karakter','error','regAlert'); return; }
            if(password.length<6) { showToast('Password min 6 karakter','error','regAlert'); return; }
            if(password!==confirm) { showToast('Konfirmasi password tidak cocok','error','regAlert'); return; }
            const snapshot = await usersRef.child(username).once('value');
            if(snapshot.exists()) { showToast('Username sudah terdaftar!','error','regAlert'); return; }
            await addUserToFirebase(username, password);
            showToast('Pendaftaran berhasil! Silakan login.','success','regAlert');
            setTimeout(()=>showLoginPage(),1500);
        }

        function createParticles() {
            const container = document.getElementById('particleField');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 5 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 12 + 6 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }
        
        function switchPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active-page'));
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active');
            const titles = { dashboard:'Dashboard', datamahasiswa:'Data Mahasiswa', statistik:'Statistik & Analisis', jadwal:'Kelas & Jadwal', keuangan:'Keuangan', pembayaran:'Pembayaran', kemahasiswaan:'Kemahasiswaan', pengumuman:'Pengumuman' };
            document.getElementById('pageTitle').innerText = titles[pageId] || 'Dashboard';
            if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('mobile-open');
            if(pageId === 'statistik') setTimeout(() => updateChart(), 100);
        }
