<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Manajemen Mahasiswa | Firebase</title>
    <!-- Firebase SDK - Cara yang BENAR untuk HTML biasa -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-card: rgba(255,255,255,0.95);
            --bg-card-solid: #ffffff;
            --bg-input: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --danger: #ef4444;
            --sidebar-width: 280px;
        }
        body.dark {
            --bg-card: rgba(30,41,59,0.95);
            --bg-card-solid: #1e293b;
            --bg-input: #334155;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: #475569;
            --primary: #818cf8;
        }
        body { font-family: system-ui, sans-serif; color: var(--text-primary); background: #f1f5f9; transition: 0.3s; }
        body.dark { background: #0f172a; }
        
        /* Loading Screen */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s;
        }
        .loading-overlay.fade-out { opacity: 0; visibility: hidden; }
        .loading-container { text-align: center; }
        .loading-logo {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; animation: pulse 1.5s infinite;
        }
        .loading-logo span { font-size: 40px; }
        @keyframes pulse { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(0.95); } }
        .loading-text { color: white; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .loading-progress { width: 200px; margin: 0 auto; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: white; animation: progress 2s infinite; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .progress-percent { color: white; font-size: 12px; margin-top: 8px; }
        
        /* Layout */
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar {
            position: fixed; left: 0; top: 0; width: var(--sidebar-width); height: 100vh;
            background: var(--bg-card); backdrop-filter: blur(10px);
            border-right: 1px solid var(--border); transition: 0.3s; z-index: 100;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar.collapsed { width: 70px; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h3 { font-size: 16px; background: linear-gradient(135deg, var(--primary), #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sidebar.collapsed .sidebar-header h3 { display: none; }
        .toggle-sidebar { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; }
        .nav-menu { flex: 1; padding: 16px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px;
            border-radius: 12px; cursor: pointer; color: var(--text-secondary); transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .nav-icon { font-size: 20px; }
        .nav-label { font-size: 14px; font-weight: 500; }
        .sidebar.collapsed .nav-label { display: none; }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar {
            width: 40px; height: 40px; background: var(--primary); border-radius: 40px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;
        }
        .sidebar.collapsed .user-details { display: none; }
        
        .main-content {
            flex: 1; margin-left: var(--sidebar-width); padding: 20px; transition: 0.3s;
        }
        .main-content.expanded { margin-left: 70px; }
        
        /* Cards */
        .card { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-card); border-radius: 12px; padding: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 28px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
        
        .btn { padding: 8px 16px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        
        input, select { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); width: 100%; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .form-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        
        .student-item { background: var(--bg-card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .student-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .student-name { font-weight: 700; color: var(--primary); cursor: pointer; }
        .grade-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .grade-A { background: #10b98120; color: #10b981; }
        .grade-B { background: #3b82f620; color: #3b82f6; }
        .grade-C { background: #f59e0b20; color: #f59e0b; }
        
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            justify-content: center; align-items: center; z-index: 1000; padding: 16px;
        }
        .modal-content {
            background: var(--bg-card-solid); border-radius: 20px; padding: 24px;
            max-width: 650px; width: 100%; max-height: 85vh; overflow-y: auto;
            border: 1px solid var(--border);
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .page-title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .top-actions { display: flex; gap: 12px; align-items: center; }
        .theme-toggle { background: var(--bg-input); border: 1px solid var(--border); border-radius: 40px; padding: 8px 16px; cursor: pointer; }
        .mobile-menu-btn { display: none; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; cursor: pointer; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }
        
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: 32px; padding: 40px; max-width: 400px; width: 100%; border: 1px solid var(--border); text-align: center; }
        
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 16px; display: none; font-size: 13px; }
        .alert-success { background: #10b98120; color: #10b981; border: 1px solid #10b981; }
        .alert-error { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
        .detail-row { display: flex; margin-bottom: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .detail-label { width: 100px; font-weight: 600; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .sidebar.mobile-open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-container">
            <div class="loading-logo"><span>🎓</span></div>
            <div class="loading-text">SISTEM MAHASISWA</div>
            <div class="loading-progress">
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <div class="progress-percent" id="progressPercent">LOADING 0%</div>
            </div>
        </div>
    </div>
    <div id="app-root" style="display: none;"></div>

    <script>
        // ==================== FIREBASE CONFIG (GANTI SESUAI MILIK ANDA) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyD174J0prcbxgCA3_tSafzsyPJNHKTrXj8",
            authDomain: "sistem-mahasiswa-c40f4.firebaseapp.com",
            databaseURL: "https://sistem-mahasiswa-c40f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sistem-mahasiswa-c40f4",
            storageBucket: "sistem-mahasiswa-c40f4.firebasestorage.app",
            messagingSenderId: "71539435477",
            appId: "1:71539435477:web:3f81b1c273ccdee5667f5c"
        };
        
        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const usersRef = database.ref('users');
        const mahasiswaRef = database.ref('mahasiswa');

        // Variabel Global
        let currentUser = null;
        let students = [];
        
        const BOBOT = { absensi: 0.05, tugasHarian: 0.10, praktikum: 0.15, uts: 0.20, uas: 0.25, proyek: 0.15, softskill: 0.10 };
        
        function hitungNilaiAkhir(data) {
            return Math.min(100, Math.max(0,
                (data.absensi||0)*0.05 + (data.tugas_harian||0)*0.10 + (data.praktikum||0)*0.15 +
                (data.uts||0)*0.20 + (data.uas||0)*0.25 + (data.proyek||0)*0.15 + (data.softskill||0)*0.10
            ));
        }
        function getGrade(na) { if (na >= 85) return 'A'; if (na >= 75) return 'B'; if (na >= 65) return 'C'; return 'D'; }
        function hitungIPK(na) { if (na >= 85) return 4.0; if (na >= 80) return 3.7; if (na >= 75) return 3.3; return 3.0; }
        function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]); }
        function showToast(msg, type, alertId) { 
            const el = document.getElementById(alertId); 
            if(el){ el.innerHTML = msg; el.className = `alert alert-${type}`; el.style.display = "block"; setTimeout(() => el.style.display = "none", 3000); } 
        }
        
        // Load Data dari Firebase
        async function loadMahasiswa() {
            try {
                const snapshot = await mahasiswaRef.once('value');
                const data = snapshot.val();
                students = data ? Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id })) : [];
                renderList();
                updateStats();
                console.log('Data loaded:', students.length);
            } catch (error) {
                console.error('Error loading:', error);
                showToast('Gagal memuat data: ' + error.message, 'error', 'globalAlert');
            }
        }
        
        async function addStudentToFirebase(data) {
            const nilai_akhir = hitungNilaiAkhir(data);
            const ipk = hitungIPK(nilai_akhir);
            const grade = getGrade(nilai_akhir);
            const newData = { ...data, nilai_akhir, ipk, grade, createdAt: Date.now() };
            await mahasiswaRef.push().set(newData);
        }
        
        async function updateStudentInFirebase(firebaseId, newData) {
            const nilai_akhir = hitungNilaiAkhir(newData);
            const ipk = hitungIPK(nilai_akhir);
            const grade = getGrade(nilai_akhir);
            await mahasiswaRef.child(firebaseId).update({ ...newData, nilai_akhir, ipk, grade });
        }
        
        async function deleteStudentFromFirebase(firebaseId) {
            await mahasiswaRef.child(firebaseId).remove();
        }
        
        async function initUsers() {
            const snapshot = await usersRef.once('value');
            if (!snapshot.exists()) {
                await usersRef.child('admin').set({ username: 'admin', password: 'admin123', createdAt: Date.now() });
                console.log('Default user created');
            }
        }
        
        async function verifyUser(username, password) {
            const snapshot = await usersRef.child(username).once('value');
            const user = snapshot.val();
            return user && user.password === password ? user : null;
        }
        
        async function addUserToFirebase(username, password) {
            await usersRef.child(username).set({ username, password, createdAt: Date.now() });
        }
        
        // CRUD Operations
        async function addStudent(data) {
            if (!/^\d{12}$/.test(data.nim)) throw new Error('NIM harus 12 digit angka');
            if (data.nama.trim().length < 3) throw new Error('Nama minimal 3 huruf');
            if (students.find(s => s.nim === data.nim)) throw new Error('NIM sudah terdaftar');
            await addStudentToFirebase(data);
            await loadMahasiswa();
            showToast('Mahasiswa berhasil ditambahkan!', 'success', 'globalAlert');
        }
        
        async function updateStudent(oldNim, newData) {
            const student = students.find(s => s.nim === oldNim);
            if (!student) throw new Error('Data tidak ditemukan');
            await updateStudentInFirebase(student.firebaseId, newData);
            await loadMahasiswa();
            showToast('Data berhasil diupdate!', 'success', 'globalAlert');
        }
        
        async function deleteStudent(nim) {
            if (!confirm('Yakin ingin menghapus data ini?')) return;
            const student = students.find(s => s.nim === nim);
            if (!student) return;
            await deleteStudentFromFirebase(student.firebaseId);
            await loadMahasiswa();
            showToast('Data berhasil dihapus!', 'success', 'globalAlert');
        }
        
        // Render Functions
        function renderList() {
            const container = document.getElementById('studentList');
            if (!container) return;
            if (students.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center">📭 Belum ada data mahasiswa. Klik "Tambah Mahasiswa" untuk menambahkan.</div>';
                return;
            }
            container.innerHTML = '';
            students.forEach(s => {
                const gradeClass = `grade-${s.grade}`;
                const div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `
                    <div class="student-row">
                        <div>
                            <div class="student-name" onclick="showDetail('${s.nim}')">${escapeHtml(s.nama)}</div>
                            <div style="font-size:11px;">NIM: ${s.nim}</div>
                        </div>
                        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap">
                            <span class="grade-badge ${gradeClass}">Grade ${s.grade}</span>
                            <span>IPK ${parseFloat(s.ipk || 0).toFixed(2)}</span>
                            <span>Nilai: ${parseFloat(s.nilai_akhir || 0).toFixed(1)}</span>
                        </div>
                        <div style="display:flex; gap:8px">
                            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); editStudent('${s.nim}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteStudent('${s.nim}')">Hapus</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        async function updateStats() {
            const total = students.length;
            const avgIpk = total ? (students.reduce((s, m) => s + (parseFloat(m.ipk) || 0), 0) / total).toFixed(2) : 0;
            const avgNa = total ? (students.reduce((s, m) => s + (parseFloat(m.nilai_akhir) || 0), 0) / total).toFixed(1) : 0;
            const gradeACount = students.filter(s => s.grade === 'A').length;
            
            document.getElementById('totalMhs') && (document.getElementById('totalMhs').innerText = total);
            document.getElementById('avgIpk') && (document.getElementById('avgIpk').innerText = avgIpk);
            document.getElementById('avgNilai') && (document.getElementById('avgNilai').innerText = avgNa);
            document.getElementById('gradeCount') && (document.getElementById('gradeCount').innerText = gradeACount);
            document.getElementById('statTotalMhs') && (document.getElementById('statTotalMhs').innerText = total);
            document.getElementById('statRataIpk') && (document.getElementById('statRataIpk').innerText = avgIpk);
            document.getElementById('statRataNilai') && (document.getElementById('statRataNilai').innerText = avgNa);
            document.getElementById('statGradeA') && (document.getElementById('statGradeA').innerText = gradeACount);
            
            const distContainer = document.getElementById('gradeDistribution');
            if (distContainer) {
                const grades = { A: 0, B: 0, C: 0, D: 0 };
                students.forEach(s => grades[s.grade]++);
                distContainer.innerHTML = `<div class="form-row-3">${Object.entries(grades).map(([g, c]) => `<div class="stat-card"><div class="stat-number">${c}</div><div class="stat-label">Grade ${g}</div></div>`).join('')}</div>`;
            }
        }
        
        function showDetail(nim) {
            const s = students.find(x => x.nim === nim);
            if (!s) return;
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-row"><div class="detail-label">NIM</div><div class="detail-value">${s.nim}</div></div>
                <div class="detail-row"><div class="detail-label">Nama</div><div class="detail-value">${escapeHtml(s.nama)}</div></div>
                <div class="detail-row"><div class="detail-label">Email</div><div class="detail-value">${escapeHtml(s.email)}</div></div>
                <div class="detail-row"><div class="detail-label">Jurusan</div><div class="detail-value">${escapeHtml(s.jurusan)}</div></div>
                <div class="detail-row"><div class="detail-label">Grade/IPK</div><div class="detail-value">Grade ${s.grade} | IPK ${parseFloat(s.ipk).toFixed(2)}</div></div>
                <div style="background:var(--bg-input); border-radius:12px; padding:12px; margin-top:12px">
                    <strong>📊 Nilai Akademik:</strong><br>
                    Absensi: ${s.absensi} | Tugas: ${s.tugas_harian}<br>
                    Praktikum: ${s.praktikum} | UTS: ${s.uts}<br>
                    UAS: ${s.uas} | Proyek: ${s.proyek}<br>
                    Softskill: ${s.softskill}<br>
                    <strong>🎯 Nilai Akhir: ${parseFloat(s.nilai_akhir).toFixed(2)}</strong>
                </div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }
        
        function searchStudent() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) { showToast('Masukkan kata kunci', 'warning', 'globalAlert'); return; }
            const results = students.filter(s => s.nama.toLowerCase().includes(keyword) || s.nim.includes(keyword));
            const area = document.getElementById('searchResultArea');
            if (results.length === 0) area.innerHTML = `<div class="card">❌ Tidak ditemukan: ${escapeHtml(keyword)}</div>`;
            else area.innerHTML = `<div class="card"><strong>✅ Ditemukan ${results.length} data:</strong><br>${results.map(s=>`📌 ${escapeHtml(s.nama)} (${s.nim}) - ${s.jurusan}<br>`).join('')}</div>`;
            area.style.display = 'block';
        }
        
        function sortByName() { students.sort((a,b)=>a.nama.localeCompare(b.nama)); renderList(); }
        function sortByIpk() { students.sort((a,b)=>parseFloat(b.ipk)-parseFloat(a.ipk)); renderList(); }
        function sortByNilai() { students.sort((a,b)=>parseFloat(b.nilai_akhir)-parseFloat(a.nilai_akhir)); renderList(); }
        
        let editTargetNim = null, isEdit = false;
        function openModal() { isEdit=false; editTargetNim=null; document.getElementById('modalTitle').innerText='Tambah Mahasiswa'; clearModal(); document.getElementById('crudModal').style.display='flex'; }
        function editStudent(nim) {
            const s = students.find(x=>x.nim===nim);
            if(!s) return;
            isEdit=true; editTargetNim=nim;
            document.getElementById('modalTitle').innerText='Edit Mahasiswa';
            document.getElementById('mNim').value=s.nim; document.getElementById('mNama').value=s.nama;
            document.getElementById('mEmail').value=s.email; document.getElementById('mHp').value=s.hp||'';
            document.getElementById('mJurusan').value=s.jurusan; document.getElementById('mAlamat').value=s.alamat||'';
            document.getElementById('mAbsensi').value=s.absensi||90; document.getElementById('mTugasHarian').value=s.tugas_harian||80;
            document.getElementById('mPraktikum').value=s.praktikum||80; document.getElementById('mUTS').value=s.uts||80;
            document.getElementById('mUAS').value=s.uas||80; document.getElementById('mProyek').value=s.proyek||80;
            document.getElementById('mSoftskill').value=s.softskill||80;
            document.getElementById('crudModal').style.display='flex';
        }
        function clearModal() { document.querySelectorAll('#crudModal input').forEach(i=>i.value=''); document.getElementById('mJurusan').value='Teknik Informatika'; document.getElementById('mAbsensi').value=90; document.getElementById('mTugasHarian').value=80; document.getElementById('mPraktikum').value=80; document.getElementById('mUTS').value=80; document.getElementById('mUAS').value=80; document.getElementById('mProyek').value=80; document.getElementById('mSoftskill').value=80; }
        async function saveStudent() {
            try {
                const data = {
                    nim: document.getElementById('mNim').value.trim(), nama: document.getElementById('mNama').value.trim(),
                    email: document.getElementById('mEmail').value.trim(), hp: document.getElementById('mHp').value.trim(),
                    jurusan: document.getElementById('mJurusan').value.trim()||'Umum', alamat: document.getElementById('mAlamat').value.trim(),
                    absensi: parseFloat(document.getElementById('mAbsensi').value)||0, tugas_harian: parseFloat(document.getElementById('mTugasHarian').value)||0,
                    praktikum: parseFloat(document.getElementById('mPraktikum').value)||0, uts: parseFloat(document.getElementById('mUTS').value)||0,
                    uas: parseFloat(document.getElementById('mUAS').value)||0, proyek: parseFloat(document.getElementById('mProyek').value)||0,
                    softskill: parseFloat(document.getElementById('mSoftskill').value)||0
                };
                if(!/^\d{12}$/.test(data.nim)) throw new Error('NIM harus 12 digit');
                if(isEdit) await updateStudent(editTargetNim, data);
                else await addStudent(data);
                closeModal();
            } catch(e) { showToast(e.message, 'error', 'modalAlert'); }
        }
        function closeModal() { document.getElementById('crudModal').style.display='none'; }
        function closeDetailModal() { document.getElementById('detailModal').style.display='none'; }
        
        // Auth Functions
        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            const user = await verifyUser(username, password);
            if(!user) { showToast('Username atau password salah!', 'error', 'loginAlert'); return; }
            currentUser = user; localStorage.setItem('currentUser', JSON.stringify(currentUser));
            renderDashboard();
        }
        
        async function doRegister() {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('regConfirm').value;
            if(username.length<3) { showToast('Username min 3 karakter','error','regAlert'); return; }
            if(password.length<6) { showToast('Password min 6 karakter','error','regAlert'); return; }
            if(password!==confirm) { showToast('Konfirmasi password tidak cocok','error','regAlert'); return; }
            const snapshot = await usersRef.child(username).once('value');
            if(snapshot.exists()) { showToast('Username sudah terdaftar!','error','regAlert'); return; }
            await addUserToFirebase(username, password);
            showToast('Pendaftaran berhasil! Silakan login.','success','regAlert');
            setTimeout(()=>showLoginPage(),1500);
        }
        
        function showLoginPage() { renderAuthPage('login'); }
        function showRegisterPage() { renderAuthPage('register'); }
        
        function renderAuthPage(type) {
            const isLogin = type === 'login';
            document.getElementById('app-root').innerHTML = `
                <div class="login-wrapper"><div class="login-card">
                    <div style="font-size:48px; margin-bottom:16px">${isLogin ? '🎓' : '📝'}</div>
                    <h2>${isLogin ? 'Sistem Manajemen Mahasiswa' : 'Daftar Akun Baru'}</h2>
                    <p style="color:var(--text-secondary); margin-bottom:24px">${isLogin ? 'Login untuk mengakses dashboard' : 'Isi data untuk mendaftar'}</p>
                    <div id="${isLogin ? 'loginAlert' : 'regAlert'}" class="alert"></div>
                    <input type="text" id="${isLogin ? 'loginUser' : 'regUser'}" placeholder="Username" ${isLogin ? 'value="admin"' : ''} style="margin-bottom:12px; width:100%">
                    <input type="password" id="${isLogin ? 'loginPass' : 'regPass'}" placeholder="Password" ${isLogin ? 'value="admin123"' : ''} style="margin-bottom:12px; width:100%">
                    ${!isLogin ? `<input type="password" id="regConfirm" placeholder="Konfirmasi Password" style="margin-bottom:20px; width:100%">` : ''}
                    <button class="btn btn-primary" onclick="${isLogin ? 'doLogin()' : 'doRegister()'}" style="width:100%">${isLogin ? 'Login' : 'Daftar'}</button>
                    ${isLogin ? `<div style="margin-top:20px; padding:12px; background:rgba(99,102,241,0.1); border-radius:12px"><p>📋 Demo Akun</p><p><strong>admin / admin123</strong></p></div>` : ''}
                    <p style="margin-top:20px">${isLogin ? 'Belum punya akun? <a href="#" onclick="showRegisterPage()">Daftar Sekarang</a>' : 'Sudah punya akun? <a href="#" onclick="showLoginPage()">Login disini</a>'}</p>
                </div></div>
            `;
            hideLoading();
        }
        
        // Dashboard Functions
        function switchPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active');
            const titles={dashboard:'Dashboard',datamahasiswa:'Data Mahasiswa',statistik:'Statistik Nilai'};
            document.getElementById('pageTitle').innerText=titles[pageId]||'Dashboard';
            if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('mobile-open');
        }
        
        function logout() { currentUser=null; localStorage.removeItem('currentUser'); showLoginPage(); }
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); }
        function initTheme() { if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); document.getElementById('mainContent').classList.toggle('expanded'); }
        function mobileToggleSidebar() { document.getElementById('sidebar').classList.toggle('mobile-open'); }
        
        function renderDashboard() {
            const firstLetter = currentUser?.username?.charAt(0)?.toUpperCase() || 'A';
            document.getElementById('app-root').innerHTML = `
                <div class="app-layout">
                    <div class="sidebar" id="sidebar">
                        <div class="sidebar-header">
                            <h3>📚 SISMAHAS</h3>
                            <button class="toggle-sidebar" onclick="toggleSidebar()">◀</button>
                        </div>
                        <div class="nav-menu">
                            <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
                                <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
                            </div>
                            <div class="nav-item" data-page="datamahasiswa" onclick="switchPage('datamahasiswa')">
                                <span class="nav-icon">👥</span><span class="nav-label">Data Mahasiswa</span>
                            </div>
                            <div class="nav-item" data-page="statistik" onclick="switchPage('statistik')">
                                <span class="nav-icon">📈</span><span class="nav-label">Statistik</span>
                            </div>
                        </div>
                        <div class="sidebar-footer">
                            <div class="user-info">
                                <div class="user-avatar">${firstLetter}</div>
                                <div class="user-details">
                                    <div class="user-name">${currentUser?.username || 'Admin'}</div>
                                    <div style="font-size:11px">Administrator</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="main-content" id="mainContent">
                        <div class="top-bar">
                            <button class="mobile-menu-btn" onclick="mobileToggleSidebar()">☰ Menu</button>
                            <h1 class="page-title" id="pageTitle">Dashboard</h1>
                            <div class="top-actions">
                                <button class="theme-toggle" onclick="toggleTheme()">🌙 Mode</button>
                                <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
                            </div>
                        </div>
                        <div id="globalAlert" class="alert"></div>
                        
                        <div id="page-dashboard" class="page-content active">
                            <div class="stats-grid">
                                <div class="stat-card"><div class="stat-number" id="totalMhs">0</div><div class="stat-label">Total Mahasiswa</div></div>
                                <div class="stat-card"><div class="stat-number" id="avgIpk">0</div><div class="stat-label">Rata-rata IPK</div></div>
                                <div class="stat-card"><div class="stat-number" id="avgNilai">0</div><div class="stat-label">Rata Nilai Akhir</div></div>
                                <div class="stat-card"><div class="stat-number" id="gradeCount">0</div><div class="stat-label">Grade A</div></div>
                            </div>
                            <div class="card">
                                <h3>Selamat Datang!</h3>
                                <p>Sistem Manajemen Mahasiswa dengan Firebase Realtime Database.</p>
                                <div style="display:flex; gap:12px; margin-top:16px">
                                    <button class="btn btn-primary" onclick="switchPage('datamahasiswa')">Kelola Data</button>
                                    <button class="btn btn-outline" onclick="switchPage('statistik')">Lihat Statistik</button>
                                </div>
                            </div>
                        </div>
                        
                        <div id="page-datamahasiswa" class="page-content">
                            <div class="btn-group">
                                <button class="btn btn-primary" onclick="openModal()">+ Tambah Mahasiswa</button>
                                <button class="btn btn-outline" onclick="sortByName()">📊 Urut Nama</button>
                                <button class="btn btn-outline" onclick="sortByIpk()">⭐ Urut IPK</button>
                                <button class="btn btn-outline" onclick="sortByNilai()">🏆 Urut Nilai</button>
                            </div>
                            <div class="card">
                                <div style="display:flex; gap:12px">
                                    <input type="text" id="searchInput" placeholder="Cari nama atau NIM..." style="flex:1">
                                    <button class="btn btn-primary" onclick="searchStudent()">Cari</button>
                                </div>
                                <div id="searchResultArea" style="display:none; margin-top:16px"></div>
                            </div>
                            <div id="studentList"></div>
                        </div>
                        
                        <div id="page-statistik" class="page-content">
                            <div class="stats-grid">
                                <div class="stat-card"><div class="stat-number" id="statTotalMhs">0</div><div class="stat-label">Total Mahasiswa</div></div>
                                <div class="stat-card"><div class="stat-number" id="statRataIpk">0</div><div class="stat-label">Rata IPK</div></div>
                                <div class="stat-card"><div class="stat-number" id="statRataNilai">0</div><div class="stat-label">Rata Nilai</div></div>
                                <div class="stat-card"><div class="stat-number" id="statGradeA">0</div><div class="stat-label">Grade A</div></div>
                            </div>
                            <div class="card">
                                <h3>Distribusi Grade</h3>
                                <div id="gradeDistribution"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="crudModal" class="modal">
                    <div class="modal-content">
                        <h2 id="modalTitle">Tambah Mahasiswa</h2>
                        <div id="modalAlert" class="alert"></div>
                        <div class="form-group"><label>NIM (12 digit)</label><input type="text" id="mNim" maxlength="12"></div>
                        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="mNama"></div>
                        <div class="form-row">
                            <div class="form-group"><label>Email</label><input type="email" id="mEmail"></div>
                            <div class="form-group"><label>No. HP</label><input type="text" id="mHp"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Jurusan</label><input type="text" id="mJurusan" value="Teknik Informatika"></div>
                            <div class="form-group"><label>Alamat</label><input type="text" id="mAlamat"></div>
                        </div>
                        <div class="form-row-4">
                            <div class="form-group"><label>Absensi</label><input type="number" id="mAbsensi" value="90"></div>
                            <div class="form-group"><label>Tugas</label><input type="number" id="mTugasHarian" value="80"></div>
                            <div class="form-group"><label>Praktikum</label><input type="number" id="mPraktikum" value="80"></div>
                            <div class="form-group"><label>UTS</label><input type="number" id="mUTS" value="80"></div>
                        </div>
                        <div class="form-row-3">
                            <div class="form-group"><label>UAS</label><input type="number" id="mUAS" value="80"></div>
                            <div class="form-group"><label>Proyek</label><input type="number" id="mProyek" value="80"></div>
                            <div class="form-group"><label>Softskill</label><input type="number" id="mSoftskill" value="80"></div>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-outline" onclick="closeModal()">Batal</button>
                            <button class="btn btn-primary" onclick="saveStudent()">Simpan</button>
                        </div>
                    </div>
                </div>
                
                <div id="detailModal" class="modal">
                    <div class="modal-content">
                        <h3>Detail Mahasiswa</h3>
                        <div id="detailContent"></div>
                        <button class="btn btn-outline" style="margin-top:16px" onclick="closeDetailModal()">Tutup</button>
                    </div>
                </div>
            `;
            loadMahasiswa();
            initTheme();
        }
        
        // Loading & Init
        let progress = 0;
        function updateLoadingProgress() {
            const interval = setInterval(() => {
                progress += 10;
                if (progress >= 100) progress = 100;
                document.getElementById('progressPercent') && (document.getElementById('progressPercent').innerText = `LOADING ${progress}%`);
                if (progress >= 100) clearInterval(interval);
            }, 200);
        }
        
        function hideLoading() {
            const el = document.getElementById('loadingOverlay');
            if(el) {
                el.classList.add('fade-out');
                setTimeout(() => {
                    el.style.display = 'none';
                    document.getElementById('app-root').style.display = 'block';
                }, 800);
            }
        }
        
        async function init() {
            updateLoadingProgress();
            await initUsers();
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    const check = await verifyUser(currentUser.username, currentUser.password);
                    if (check) renderDashboard();
                    else showLoginPage();
                } catch(e) { showLoginPage(); }
            } else {
                showLoginPage();
            }
        }
        
        // Expose functions
        window.toggleTheme = toggleTheme;
        window.toggleSidebar = toggleSidebar;
        window.mobileToggleSidebar = mobileToggleSidebar;
        window.switchPage = switchPage;
        window.openModal = openModal;
        window.editStudent = editStudent;
        window.saveStudent = saveStudent;
        window.closeModal = closeModal;
        window.closeDetailModal = closeDetailModal;
        window.showDetail = showDetail;
        window.deleteStudent = deleteStudent;
        window.searchStudent = searchStudent;
        window.sortByName = sortByName;
        window.sortByIpk = sortByIpk;
        window.sortByNilai = sortByNilai;
        window.doLogin = doLogin;
        window.doRegister = doRegister;
        window.showLoginPage = showLoginPage;
        window.showRegisterPage = showRegisterPage;
        window.logout = logout;
        
        init();
    </script>
</body>
</html>
